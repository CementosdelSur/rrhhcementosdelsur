<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Nuevo Empleado - Cementos del Sur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos optimizados para el Logo Centrado y Responsivo */
    .company-logo {
    max-height: 200px; /* Altura ideal para celular y PC */
    max-width: 200%;   /* Evita que se desborde en pantallas muy chicas */
    width: auto;
    height: auto;
    object-fit: contain;
}
     
    </style>
</head>
<body>

<!-- BARRA DE NAVEGACIÓN CON LOGO CENTRADO -->
<nav class="navbar navbar-light bg-white shadow-sm mb-4">
  <div class="container-fluid justify-content-center">
    <a class="navbar-brand me-0" href="#">
      <img src="logo.jpg" alt="Cementos del Sur Logo" class="company-logo">
    </a>
  </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="form-container p-4 p-md-5">
                <h2 class="text-center mb-4 text-primary">Información de Ingreso de Personal</h2>
                
                <form id="employeeForm">
                    
                    <div class="section-title text-primary">1. Datos Personales</div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="dni" class="form-label">Documento de Identidad (DNI/Pasaporte)</label>
                            <input type="text" class="form-control" id="dni" name="dni" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Correo Electrónico Personal</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telefono" class="form-label">Teléfono de Contacto</label>
                            <input type="tel" class="form-control" id="telefono" name="telefono" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fechaIngreso" class="form-label">Fecha de Ingreso a la Empresa</label>
                            <input type="date" class="form-control" id="fechaIngreso" name="fechaIngreso" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="area" class="form-label">Área / Sector asignado</label>
                            <select class="form-select" id="area" name="area" required>
                                <option value="Sistemas / IT">Operario Mixer</option>
                                <option value="Recursos Humanos">Operario Planta</option>
                                <option value="Operaciones">Chofer Tolva/Batea</option>
                                <option value="Administración">Mécanico</option>
<option value="Operaciones">Administración / Finanzas</option>

                            </select>
                        </div>
                    </div>

                    <div class="section-title text-primary">2. Datos de Licencia de Conducir</div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="tieneLicencia" class="form-label">¿Posee Licencia de Conducir?</label>
                            <select class="form-select" id="tieneLicencia" name="tieneLicencia" onchange="toggleLicenciaFields()" required>
                                <option value="No">No</option>
                                <option value="Sí">Sí</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="claseLicencia" class="form-label">Clase / Categoría</label>
                            <input type="text" class="form-control" id="claseLicencia" name="claseLicencia" placeholder="Ej: B1, Profesional" disabled>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="vencimientoLicencia" class="form-label">Fecha de Vencimiento</label>
                            <input type="date" class="form-control" id="vencimientoLicencia" name="vencimientoLicencia" disabled>
                        </div>
                    </div>

                    <div class="section-title text-primary">3. Contacto de Emergencia</div>
                    <div class="row">
                        <div class="col-md-5 mb-3">
                            <label for="nombreEmergencia" class="form-label">Nombre del Contacto</label>
                            <input type="text" class="form-control" id="nombreEmergencia" name="nombreEmergencia" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="parentescoEmergencia" class="form-label">Parentesco / Relación</label>
                            <input type="text" class="form-control" id="parentescoEmergencia" name="parentescoEmergencia" placeholder="Ej: Madre, Cónyuge" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="telefonoEmergencia" class="form-label">Teléfono de Emergencia</label>
                            <input type="tel" class="form-control" id="telefonoEmergencia" name="telefonoEmergencia" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-4" id="btnEnviar">Enviar Datos de Ingreso</button>
                </form>

                <div id="mensaje" class="mt-3 alert d-none" role="alert"></div>
            </div>
        </div>
    </div>
</div>

<script>
   const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwMUN3DuJOgqhYoksl84I80HVi2KScMOBUvStXtQJcms_cl4odClzP_7MRhmr_FjGk/exec";

    // Activa o desactiva campos de licencia según la respuesta
    function toggleLicenciaFields() {
        const tieneLicencia = document.getElementById('tieneLicencia').value;
        const clase = document.getElementById('claseLicencia');
        const vencimiento = document.getElementById('vencimientoLicencia');
        
        if (tieneLicencia === 'Sí') {
            clase.disabled = false;
            clase.required = true;
            vencimiento.disabled = false;
            vencimiento.required = true;
        } else {
            clase.disabled = true;
            clase.required = false;
            clase.value = "";
            vencimiento.disabled = true;
            vencimiento.required = false;
            vencimiento.value = "";
        }
    }

    // Envío de datos
    document.getElementById('employeeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnEnviar');
        const mensaje = document.getElementById('mensaje');
        
        btn.disabled = true;
        btn.innerText = "Guardando información...";
        
        const formData = new FormData(this);
        
        fetch(WEB_APP_URL, {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.result === 'success') {
                mensaje.className = "mt-3 alert alert-success";
                mensaje.innerText = "¡Datos personales y de contacto registrados con éxito!";
                document.getElementById('employeeForm').reset();
                toggleLicenciaFields(); // Resetea el estado de los inputs de licencia
            } else {
                throw new Error();
            }
        })
        .catch(err => {
            mensaje.className = "mt-3 alert alert-danger";
            mensaje.innerText = "Hubo un problema al procesar el registro. Inténtalo de nuevo.";
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "Enviar Datos de Ingreso";
            mensaje.classList.remove('d-none');
        });
    });
</script>

</body>
</html>
